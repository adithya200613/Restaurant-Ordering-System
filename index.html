<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlavourDB — Restaurant Ordering System</title>
  <meta name="description" content="A DBMS-powered restaurant ordering system. Browse our menu, search for your favourite dishes, and add them to your cart instantly." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     HEADER
═══════════════════════════════════════════ -->
<header class="header">

  <!-- Logo -->
  <a class="logo" href="#" aria-label="FlavourDB Home">
    <span class="logo-icon">🍽️</span>
    <span class="logo-text">FlavourDB</span>
  </a>

  <!-- Search Bar -->
  <div class="header-search" role="search">
    <span class="search-icon">🔍</span>
    <input
      type="search"
      id="searchInput"
      placeholder="Search dishes, cuisines…"
      aria-label="Search menu items"
      autocomplete="off"
    />
  </div>

  <!-- Actions -->
  <div class="header-actions">

    <!-- Veg-only Toggle -->
    <label class="veg-toggle" for="vegToggle" title="Show vegetarian items only">
      <input type="checkbox" id="vegToggle" role="switch" aria-label="Vegetarian only" />
      <span class="toggle-pill"></span>
      🌿 Veg Only
    </label>

    <!-- Cart Button -->
    <button class="cart-btn" id="cartOpenBtn" onclick="openCart()" aria-label="Open cart">
      🛒 Cart
      <span class="cart-count" id="cartCount">0</span>
    </button>

  </div>
</header>


<!-- ═══════════════════════════════════════════
     MAIN LAYOUT
═══════════════════════════════════════════ -->
<div class="app-layout">

  <!-- ── SIDEBAR (Categories) ── -->
  <aside class="sidebar" aria-label="Menu categories">
    <div class="sidebar-title">Categories</div>
    <div id="categoryList"></div>
  </aside>

  <!-- ── MAIN CONTENT (Menu Grid) ── -->
  <main class="main-content" id="mainContent">

    <div class="section-header">
      <h1 class="section-title" id="sectionTitle"><span>All Items</span></h1>
      <span class="result-count" id="resultCount">0 items</span>
    </div>

    <div class="menu-grid" id="menuGrid" aria-label="Menu items" role="list">
      <!-- Cards injected by app.js -->
    </div>

  </main>
</div>


<!-- ═══════════════════════════════════════════
     CART DRAWER
═══════════════════════════════════════════ -->

<!-- Backdrop -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()" aria-hidden="true"></div>

<!-- Drawer Panel -->
<aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">

  <div class="drawer-header">
    <div class="drawer-title">🛒 Your Order</div>
    <button class="drawer-close" onclick="closeCart()" aria-label="Close cart">✕</button>
  </div>

  <!-- Item List -->
  <div class="cart-items-list" id="cartItemsList" role="list"></div>

  <!-- Empty State -->
  <div class="cart-empty" id="cartEmpty" aria-live="polite">
    <div class="ce-icon">🛒</div>
    <p>Your cart is empty</p>
    <p style="font-size:0.78rem">Add delicious items from the menu!</p>
  </div>

  <!-- Bill Summary + Actions -->
  <div class="drawer-footer" id="drawerFooter" style="display:none">
    <div class="bill-row">
      <span>Subtotal</span>
      <span id="billSubtotal">$0.00</span>
    </div>
    <div class="bill-row">
      <span>Tax (5%)</span>
      <span id="billTax">$0.00</span>
    </div>
    <div class="bill-row">
      <span>Delivery Fee</span>
      <span id="billDelivery">$0.00</span>
    </div>
    <div class="bill-row total">
      <span>Total</span>
      <span id="billTotal">$0.00</span>
    </div>
    <button class="order-btn" id="orderBtn" onclick="placeOrder()">
      ✅ Place Order
    </button>
    <button class="clear-btn" onclick="clearCart()">
      🗑️ Clear Cart
    </button>
  </div>

</aside>


<!-- ═══════════════════════════════════════════
     ORDER SUCCESS MODAL
═══════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Order placed">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <h2>Order Placed!</h2>
    <p>Your delicious food is being prepared. Sit back and relax!</p>
    <div class="order-id-badge" id="orderIdBadge">Order ID: ORD-XXXXXX</div>
    <button class="modal-close-btn" onclick="closeModal()">Continue Ordering</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     TOAST NOTIFICATIONS
═══════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>


<!-- ═══════════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════════ -->
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
